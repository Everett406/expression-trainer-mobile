name: Release APK Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Add Android platform
        run: npx cap add android || true

      - name: Copy assets
        run: npx cap copy android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure signing in build.gradle
        run: |
          cd android/app
          # Insert signing config inside the android {} block, before buildTypes
          sed -i '/buildTypes {/i \
              signingConfigs {\
                  release {\
                      storeFile file("release.keystore")\
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"\
                      keyAlias "${{ secrets.KEY_ALIAS }}"\
                      keyPassword "${{ secrets.KEY_PASSWORD }}"\
                  }\
              }' build.gradle

          # Set the release build type to use our signing config
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' build.gradle

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease -x lint --no-daemon

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_PATH" "expression-trainer-${TAG}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: expression-trainer-*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: expression-trainer-*.apk
